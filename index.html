<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ibn Sino Jizzax</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --blue: #003366; --gold: #d4af37; --bg: #f4f7f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; }
        .header { background: var(--blue); color: white; padding: 25px 15px; text-align: center; border-bottom: 5px solid var(--gold); border-radius: 0 0 30px 30px; }
        .school-logo { width: 70px; height: 70px; border-radius: 50%; background: white; border: 2px solid var(--gold); }
        .container { padding: 15px; }
        .section { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: white; border-radius: 20px; padding: 18px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #e1e8ed; }
        .list-btn { background: #fff; border: 1px solid #eee; padding: 12px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; margin-bottom: 8px; }
        .t-icon { width: 45px; height: 45px; border-radius: 50%; background: var(--blue); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .modal { display: none; position: fixed; z-index: 20000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 15% auto; padding: 25px; border-radius: 30px; width: 85%; text-align: center; position: relative; max-height: 80vh; overflow-y: auto; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0 25px 0; border-top: 1px solid #ddd; z-index: 10000; }
        .nav-item { text-align: center; flex: 1; color: #8e9aaf; font-size: 10px; cursor: pointer; }
        .nav-active { color: var(--blue); font-weight: bold; }
        .nav-icon { font-size: 22px; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="photo_2026-02-13_08-43-51.jpg" class="school-logo">
        <h3 style="margin:10px 0 0 0;">IBN SINO JIZZAX</h3>
    </div>

    <div class="container">
        <div id="staff" class="section active">
            <div class="card">
                <h4 style="color:var(--blue); margin:0 0 15px 0;">🏢 Rahbariyat va Xodimlar</h4>
                <div id="staff-list"></div>
            </div>
        </div>

        <div id="home" class="section">
            <div class="card">
                <h4 style="color:var(--blue); margin:0 0 10px 0;">🔍 O'quvchi qidirish</h4>
                <input type="text" id="sInput" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd;" placeholder="Ismni yozing..." oninput="searchS()">
                <div id="sResult" style="display:none; margin-top:15px; background:#eef7ff; padding:15px; border-radius:12px;">
                    <b id="sn"></b><p id="sa"></p>
                </div>
            </div>
        </div>

        <div id="contact" class="section">
            <div class="card">
                <h4 style="color:var(--blue); margin:0 0 10px 0;">✉️ Aloqa</h4>
                <p>Telegram: @K_Dilmurod</p>
                <p>Tel: +998 99 771 22 88</p>
                <p>Tel: +998 93 305 33 83</p>
            </div>
        </div>
    </div>

    <div id="tModal" class="modal">
        <div class="modal-content">
            <span style="position:absolute; right:20px; top:10px; font-size:30px; cursor:pointer;" onclick="closeM()">&times;</span>
            <h3 id="mn" style="color:var(--blue); margin:0;"></h3>
            <p id="mp" style="font-weight:bold; color:var(--gold); margin:10px 0; font-size:14px;"></p>
            <div id="minfo" style="font-size:13px; color:#444; text-align:left; line-height:1.6; border-top:1px solid #eee; padding-top:10px;"></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item nav-active" id="n2" onclick="st('staff', 'n2')"><span class="nav-icon">👥</span>Xodimlar</div>
        <div class="nav-item" id="n1" onclick="st('home', 'n1')"><span class="nav-icon">🏠</span>Asosiy</div>
        <div class="nav-item" id="n4" onclick="st('contact', 'n4')"><span class="nav-icon">✉️</span>Aloqa</div>
    </div>

    <script>
        // FAQAT SIZ BERGAN DOCX VA CSV FAYLLARDAGI HODIMLAR
        const staffData = [
            { n: "Karimqulov Dilmurod Qurbonboyevich", p: "Maktab Direktori", i: "Tug'ilgan vaqti: 19.12.1986. Yoshi: 39. Toifasi: Oliy. Ish staji: 20 yil." },
            { n: "Jo'rayeva Feruza Ismatovna", p: "O'quv ishlari bo'yicha direktor o'rinbosari (O'TIBDO')", i: "Tug'ilgan vaqti: 27.10.1975. Yoshi: 50. Toifasi: Ikkinchi. Ish staji: 31 yil." },
            { n: "Ubaydullayev Sardorbek Safarbek o'g'li", p: "O'quv ishlari bo'yicha direktor o'rinbosari", i: "Tug'ilgan vaqti: 26.06.1994. Yoshi: 31. Toifasi: Oliy. Ish staji: 6 yil." },
            { n: "Ahmadov Ijod Narziqulovich", p: "Ijodiy-madaniy masalalar bo'yicha targ'ibotchi", i: "Mutaxassisligi: Milliy istiqlol g'oyasi, huquq va ma'naviyat. Toifasi: Oliy. Ish staji: 16 yil." },
            { n: "Abdunazarova Gulnoza Isomiddinovna", p: "Direktor o'rinbosari", i: "Mutaxassisligi: Ingliz tili o'qituvchisi. Toifasi: Birinchi. Ish staji: 14 yil." },
            { n: "Qurbonov Dilmurod Sayfullayevich", p: "Jismoniy tarbiya fani o'qituvchisi", i: "Mutaxassisligi: Jismoniy madaniyat. Toifasi: Ikkinchi. Ish staji: 23 yil." },
            { n: "Allayarova Ra'no Musurmonovna", p: "Ona tili va adabiyot o'qituvchisi", i: "Mutaxassisligi: Filolog. Toifasi: Birinchi. Ish staji: 24 yil." },
            { n: "Norbekova Shohida Marsovna", p: "Ona tili va adabiyot o'qituvchisi", i: "Mutaxassisligi: Filolog. Toifasi: Birinchi. Ish staji: 19 yil." },
            { n: "Turg'unov Alisher Eliboy o'g'li", p: "Geografiya fani o'qituvchisi", i: "Mutaxassisligi: Geografiya. Toifasi: Oliy. Ish staji: 11 yil." },
            { n: "Maxmudova Nilufar Xalilovna", p: "San'at (ART) o'qituvchisi", i: "Mutaxassisligi: Musiqa ta'limi. Ish staji: 24 yil." },
            { n: "Tursunqulova Nargiza", p: "Kutubxonachi", i: "Tug'ilgan vaqti: 14.10.1977. Yoshi: 48. Toifasi: Mutaxassis. Ish staji: 27 yil." }
        ];

        function renderStaff() {
            const list = document.getElementById('staff-list');
            list.innerHTML = '';
            staffData.forEach(s => {
                const item = document.createElement('div');
                item.className = 'list-btn';
                item.onclick = () => openM(s.n, s.p, s.i);
                item.innerHTML = `
                    <div style="display:flex;align-items:center;gap:10px;">
                        <div class="t-icon">${s.n[0]}</div>
                        <div style="text-align:left;">
                            <b>${s.n.split(' ')[0]} ${s.n.split(' ')[1]}</b><br>
                            <small style="color:#777;">${s.p}</small>
                        </div>
                    </div>
                    <span>➡️</span>
                `;
                list.appendChild(item);
            });
        }

        function st(sId, nId) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.getElementById(sId).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
            document.getElementById(nId).classList.add('nav-active');
        }

        function openM(n, p, i) {
            document.getElementById('mn').innerText = n;
            document.getElementById('mp').innerText = p;
            document.getElementById('minfo').innerHTML = i;
            document.getElementById('tModal').style.display = 'block';
        }

        function closeM() { document.getElementById('tModal').style.display = 'none'; }

        function searchS() {
            let v = document.getElementById('sInput').value.toLowerCase().trim();
            let sn = document.getElementById('sn');
            let sa = document.getElementById('sa');
            let res = document.getElementById('sResult');
            if(v.length > 0) {
                res.style.display = 'block';
                sn.innerText = v.toUpperCase();
                sa.innerText = "Tahliliy ma'lumotlar yuklanmoqda...";
            } else { res.style.display = 'none'; }
        }

        renderStaff();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
