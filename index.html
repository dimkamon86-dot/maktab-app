<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ibn Sino Jizzax - Platforma</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .header { background: #003366; color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .school-logo { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #d4af37; margin-bottom: 10px; }
        
        .search-box { margin-bottom: 20px; }
        #studentSearch { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }

        .card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: none; margin-bottom: 20px; }
        .student-info { display: flex; align-items: center; gap: 15px; }
        .student-photo { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .video-container { width: 100%; margin: 15px 0; border-radius: 10px; overflow: hidden; aspect-ratio: 16/9; background: #000; }
        .btn { width: 100%; padding: 15px; background: #003366; color: white; border-radius: 10px; border: none; font-weight: bold; }
        .no-result { text-align: center; color: #666; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <img src="photo_2026-02-13_08-43-51.jpg" class="school-logo" alt="Logo">
        <h3>Abu Ali ibn Sino</h3>
        <p>Jizzax filiali raqamli platformasi</p>
    </div>

    <div class="search-box">
        <input type="text" id="studentSearch" placeholder="Фарзандингиз исмини ёзинг..." onkeyup="searchStudent()">
    </div>

    <div id="studentCard" class="card">
        <div class="student-info">
            <img id="sPhoto" src="" class="student-photo">
            <div>
                <h4 id="sName" style="margin: 0;"></h4>
                <small id="sClass" style="color: #666;"></small>
            </div>
        </div>
        <p id="sReport" style="font-size: 14px; margin-top: 10px;"></p>
        <div class="video-container">
            <iframe id="sVideo" width="100%" height="100%" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <div id="noResult" class="no-result">Исмни киритинг ва қидирув натижасини кўринг.</div>

    <script>
        // БУ ЕРДА ЎҚУВЧИЛАР РЎЙХАТИ ТУРАДИ
        const students = [
            {
                name: "Alisher Sobirov",
                class: "9-A sinf",
                photo: "https://via.placeholder.com/100",
                report: "Математикадан юқори натижа!",
                video: "https://www.youtube.com/embed/dQw4w9WgXcQ"
            },
            {
                name: "Jasur Olimov",
                class: "10-B sinf",
                photo: "https://via.placeholder.com/100",
                report: "Кимё фанидан олимпиада ғолиби.",
                video: "https://www.youtube.com/embed/dQw4w9WgXcQ"
            }
        ];

        function searchStudent() {
            let input = document.getElementById('studentSearch').value.toLowerCase();
            let card = document.getElementById('studentCard');
            let noResult = document.getElementById('noResult');

            let result = students.find(s => s.name.toLowerCase().includes(input));

            if (input.length > 2 && result) {
                card.style.display = 'block';
                noResult.style.display = 'none';
                document.getElementById('sName').innerText = result.name;
                document.getElementById('sClass').innerText = result.class;
                document.getElementById('sPhoto').src = result.photo;
                document.getElementById('sReport').innerText = result.report;
                document.getElementById('sVideo').src = result.video;
            } else {
                card.style.display = 'none';
                noResult.style.display = 'block';
            }
        }

        let tg = window.Telegram.WebApp;
        tg.expand();
    </script>
</body>
</html>
